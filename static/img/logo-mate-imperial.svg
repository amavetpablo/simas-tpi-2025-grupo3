<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6f47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a6895f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b5538;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yerbaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b9f3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bombillaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Mate imperial (forma cilíndrica con base) -->
  <!-- Base del mate -->
  <ellipse cx="60" cy="100" rx="35" ry="8" fill="#4a3a2a" opacity="0.8"/>
  
  <!-- Cuerpo del mate -->
  <rect x="35" y="30" width="50" height="70" rx="5" fill="url(#mateGradient)" stroke="#6b5538" stroke-width="2"/>
  
  <!-- Borde superior del mate -->
  <ellipse cx="60" cy="30" rx="25" ry="8" fill="#6b5538"/>
  
  <!-- Yerba dentro del mate -->
  <ellipse cx="60" cy="50" rx="20" ry="5" fill="url(#yerbaGradient)" opacity="0.9"/>
  <ellipse cx="60" cy="45" rx="18" ry="4" fill="url(#yerbaGradient)" opacity="0.7"/>
  
  <!-- Bombilla -->
  <line x1="75" y1="35" x2="85" y2="25" stroke="url(#bombillaGradient)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="85" cy="25" r="3" fill="url(#bombillaGradient)"/>
  
  <!-- Detalles decorativos (virola) -->
  <rect x="35" y="25" width="50" height="8" fill="#d4af37" opacity="0.6"/>
  <rect x="35" y="90" width="50" height="5" fill="#d4af37" opacity="0.4"/>
</svg>

