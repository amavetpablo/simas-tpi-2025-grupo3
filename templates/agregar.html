{% extends "base.html" %}

{% block title %}Agregar Producto - CRUD Productos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-plus"></i> Agregar Nuevo Producto
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">
                                <i class="fas fa-tag"></i> Nombre del Producto *
                            </label>
                            <input type="text" class="form-control" id="nombre" name="nombre" 
                                   placeholder="Ej: Laptop Dell XPS" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="proveedor" class="form-label">
                                <i class="fas fa-truck"></i> Proveedor *
                            </label>
                            <input type="text" class="form-control" id="proveedor" name="proveedor" 
                                   placeholder="Ej: Dell Technologies" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="cantidad" class="form-label">
                                <i class="fas fa-cubes"></i> Cantidad *
                            </label>
                            <input type="number" class="form-control" id="cantidad" name="cantidad" 
                                   placeholder="Ej: 50" min="0" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="tipo_material" class="form-label">
                                <i class="fas fa-cube"></i> Tipo de Material *
                            </label>
                            <input type="text" class="form-control" id="tipo_material" name="tipo_material" 
                                   placeholder="Ej: Plástico, Metal, Vidrio, etc." required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="precio" class="form-label">
                                <i class="fas fa-dollar-sign"></i> Precio por Unidad *
                            </label>
                            <input type="number" class="form-control" id="precio" name="precio" 
                                   placeholder="Ej: 1000" step="0.01" min="0" value="1000" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">
                            <i class="fas fa-align-left"></i> Descripción
                        </label>
                        <textarea class="form-control" id="descripcion" name="descripcion" 
                                  rows="4" placeholder="Descripción detallada del producto..."></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Producto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
